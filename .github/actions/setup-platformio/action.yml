name: Setup PlatformIO
description: >
  Sets up Python, installs PlatformIO at a specified version, and restores
  pip and PlatformIO caches for faster CI runs.

inputs:
  platformio-version:
    description: >
      PlatformIO version as a full pip version specifier, e.g. "==6.1.16",
      ">=6.0,<7" or "" (empty) for the latest release.
    required: false
    default: ""
  cache-key-suffix:
    description: Additional suffix for the PlatformIO cache key (e.g. a hash of platformio.ini and libdeps)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ inputs.platformio-version }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-platformio-${{ inputs.platformio-version }}-${{ inputs.cache-key-suffix }}
        restore-keys: |
          ${{ runner.os }}-platformio-${{ inputs.platformio-version }}-
          ${{ runner.os }}-platformio-

    - name: Install PlatformIO
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ -n "${{ inputs.platformio-version }}" ]; then
          pip install "platformio${{ inputs.platformio-version }}"
        else
          pip install --upgrade platformio
        fi
