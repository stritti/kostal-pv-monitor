name: vuepress - CI
on: [push]
  # trigger deployment on every push to main branch
  #push:
  #  branches: [main]
  # trigger deployment manually
  #workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Security: Limit GITHUB_TOKEN permissions to minimum required
    permissions:
      contents: write  # Needed for gh-pages deployment
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: vuepress-deploy
        uses: jenkey2011/vuepress-deploy@v1.6.0
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          TARGET_REPO: stritti/kostal-pv-monitor
          TARGET_BRANCH: gh-pages
          BUILD_SCRIPT: npm ci && npm run docs:build
          BUILD_DIR: docs/.vuepress/dist/
