###########################
###########################
## Platform.io Actions   ##
###########################
###########################
name: PlatformIO - CI

#
# Documentation:
# https://docs.platformio.org/en/latest/integration/ci/github-actions.html
#

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    # Security: Limit GITHUB_TOKEN permissions to minimum required
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PlatformIO
        uses: ./.github/actions/setup-platformio
        with:
          cache-key-suffix: ${{ hashFiles('platformio.ini', '.pio/libdeps/**') }}

      - name: Run PlatformIO Check (Linter)
        run: pio check --severity=high --skip-packages
        continue-on-error: true

      - name: Run PlatformIO Build
        run: pio run

      - name: Run PlatformIO Tests
        run: pio test -e native
        continue-on-error: false
