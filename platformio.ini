; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = ttygo-t5
description = E-Paper to monitor Kostal Plenticore

[env:ttygo-t5]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
	adafruit/Adafruit BusIO@^1.16.1
	adafruit/Adafruit GFX Library@^1.11.11
	zinggjm/GxEPD@^3.1.5
	emelianov/modbus-esp8266@^4.1.0
	juerd/ESP-WiFiSettings@^3.8.0
	me-no-dev/AsyncTCP@^1.1.4
	Wire@2.0.0
	olikraus/U8g2@^2.35.30
	olikraus/U8g2_for_Adafruit_GFX@^1.8.0
	arduino-libraries/NTPClient@^3.2.1
	madpilot/mDNSResolver@^0.3
	jchristensen/Timezone@^1.2.4
build_type = release
build_flags =
	-D SERIAL_SPEED=115200
	-Os  ; Optimize for size
	-DCORE_DEBUG_LEVEL=0  ; Disable debug output for production
upload_port = COM8
upload_speed = 2000000
monitor_port = COM8
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time, default
test_ignore = test_desktop

[env:ttygo-t5-debug]
extends = env:ttygo-t5
build_type = debug
build_flags =
	-D SERIAL_SPEED=115200
	-DCORE_DEBUG_LEVEL=3  ; Enable verbose debug output
